name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Build and Test
        uses: cerberauth/ci/actions/node-build-test@main

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Install jwtop (install only)
        id: test-install
        uses: ./
        with:
          version: latest

      - name: Verify jwtop is on PATH
        id: verify
        run: jwtop --help

      - name: Decode a JWT
        id: test-decode
        uses: ./
        with:
          version: latest
          command: decode
          args: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIn0.dozjgNryP4J3jVmNHl0w5N_XgL0n3I9PlFUP0THsR8U # gitleaks:allow

      - name: Print decoded output
        id: output
        run: echo "${{ steps.test-decode.outputs.output }}"
