name: 'JWTop - JWT Operations Toolkit'
description:
  'Install and run jwtop for JWT decoding, verification, creation, signing,
  cracking, and exploit testing'
author: 'cerberauth'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  token:
    description:
      'GitHub token used to fetch release information from the jwtop repository.'
    required: false
    default: ${{ github.token }}
  version:
    description:
      'Version of jwtop to install (e.g. v0.2.0). Defaults to latest.'
    required: false
    default: 'latest'
  command:
    description:
      'jwtop command to run (decode, verify, create, sign, crack, exploit). If
      omitted, only installs jwtop.'
    required: false
    default: ''
  args:
    description:
      'Arguments to pass to the jwtop command (e.g. "eyJ... --secret mysecret").'
    required: false
    default: ''
  telemetry:
    description:
      'jwtop collects fully anonymized usage data to help improve the tool. You
      can disable it by setting this to false.'
    required: false
    default: 'true'

outputs:
  output:
    description:
      'Stdout from the jwtop command (only set when command is provided).'
  jwtop-path:
    description: 'Directory where jwtop binary is located.'

runs:
  using: node24
  main: dist/index.js
